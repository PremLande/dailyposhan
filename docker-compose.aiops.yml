services:
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: dailyposhan-alertmanager
    command: ["--config.file=/etc/alertmanager/config.yml"]
    volumes:
      - ./monitoring/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: dailyposhan-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    restart: unless-stopped

  aiops-service:
    build:
      context: .
      dockerfile: ./aiops_service/Dockerfile
    container_name: dailyposhan-aiops-service
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    ports:
      - "8001:8000"
    restart: unless-stopped
