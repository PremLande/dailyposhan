name: CI

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '*.md'
  pull_request:

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend-django/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend-django/requirements.txt
      - name: Validate Django app
        run: |
          python backend-django/manage.py check
          python -m compileall backend-django

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend-react
      - name: Build frontend
        run: npm run build
        working-directory: frontend-react

  docker:
    name: Docker validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend Docker image
        run: docker build -f backend-django/Dockerfile -t dailyposhan-backend:ci ./backend-django
      - name: Build frontend Docker image
        run: docker build -f frontend-react/Dockerfile -t dailyposhan-frontend:ci ./frontend-react
      - name: Validate docker-compose
        run: |
          if command -v docker compose >/dev/null 2>&1; then
            docker compose -f docker-compose.yml config
          else
            docker-compose -f docker-compose.yml config
          fi
