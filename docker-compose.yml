services:
  backend:
    build:
      context: ./backend-django
    container_name: dailyposhan-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend-django:/app
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=dailyposhan-backend
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_DEPLOYMENT_ENVIRONMENT=development
    depends_on:
      - otel-collector
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-react
    container_name: dailyposhan-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: dailyposhan-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "8888:8888"
      - "8889:8889"
    depends_on:
      - jaeger
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: dailyposhan-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: dailyposhan-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/provisioning/dashboards/provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./grafana/provisioning/dashboards/daily-poshan-observability.json:/etc/grafana/provisioning/dashboards/daily-poshan-observability.json:ro
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: dailyposhan-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "14250:14250"
    restart: unless-stopped
