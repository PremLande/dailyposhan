global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "dailyposhan-backend"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
